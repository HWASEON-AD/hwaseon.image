<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>대시보드 — HWASEON IMAGE</title>
  <link rel="stylesheet" href="dashboard.css" />
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <img src="hwaseon로고.png" alt="Hwaseon" class="brand-logo" />
      </a>
      <nav class="site-nav">
        <a id="userLink" href="register.html">User</a>
        <a id="dashboardLink" href="dashboard.html">Dashboard</a>
        <span id="whoami" class="nav-id"></span>
        <a id="authLink" href="login.html">Login</a>
      </nav>
    </div>
  </header>

  <main class="main">

    <!-- 상단 액션바 -->
    <div class="topbar">
      <a href="index.html" class="btn btn--primary">+ 이미지 업로드</a>
      <button id="excelDownload" class="btn btn--outline">엑셀 다운로드</button>
      <button id="filteredExcelDownload" class="btn btn--outline">검색결과 엑셀</button>
      <button id="textDownload" class="btn btn--outline">텍스트 다운</button>
      <button id="bulkTextBtn" class="btn btn--outline">텍스트 일괄 변경</button>
    </div>

    <!-- 블로그 검색 필터 -->
    <div class="filter-bar">
      <input type="text" id="blogFilterInput" class="filter-input"
             placeholder="블로그 ID 입력 (예: siehl) — 해당 블로그에서 쓰인 이미지만 표시" />
      <button id="blogFilterClear" class="btn btn--ghost btn--sm" style="display:none;">✕ 초기화</button>
    </div>

    <!-- 이미지 리스트 -->
    <section class="images-section">
      <div class="section-header">
        <h2 class="section-title">내 이미지 <span id="imageCount" class="count-badge"></span></h2>
      </div>
      <div class="image-list" id="imageGrid"></div>
    </section>

  </main>

  <!-- 이미지 팝업 -->
  <div class="img-popup hidden" id="imgPopup">
    <div class="img-popup__backdrop" id="imgPopupBackdrop"></div>
    <div class="img-popup__box">
      <button class="img-popup__close" id="imgPopupClose">✕</button>
      <img class="img-popup__img" id="imgPopupImg" alt="이미지 미리보기" />
    </div>
  </div>

  <!-- 토스트 컨테이너 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 교체 모달 -->
  <div id="replaceModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content" style="max-width:480px;">
      <div class="modal-title-row-main">
        <span class="modal-title-filename">이미지 교체</span>
        <button id="replaceModalClose" class="btn btn--ghost btn--sm">✕</button>
      </div>

      <div class="replace-tabs">
        <button class="replace-tab replace-tab--active" id="replaceTabImage" type="button">이미지</button>
        <button class="replace-tab" id="replaceTabText" type="button">텍스트</button>
      </div>

      <!-- 이미지 탭 -->
      <div id="replaceImagePane">
        <label class="replace-file-label" for="replaceFileInput">
          <input type="file" id="replaceFileInput" accept="image/*" />
          <span id="replaceFileSpan">📁 이미지 선택</span>
        </label>
        <div style="margin-top:14px;">
          <button id="replaceImageSubmit" class="btn btn--primary btn--sm" disabled>교체</button>
        </div>
      </div>

      <!-- 텍스트 탭 -->
      <div id="replaceTextPane" class="hidden">
        <textarea id="replaceTextInput" class="text-textarea" rows="4"
          placeholder="텍스트 입력&#10;Enter로 줄바꿈 가능"></textarea>
        <div class="text-opts" style="margin-top:12px;">
          <div class="text-opt-row">
            <span class="text-opt-label">폰트 크기</span>
            <select id="replaceFontSize" class="text-opt-select">
              <option value="auto">자동</option>
              <option value="16">16</option>
              <option value="20">20</option>
              <option value="24">24</option>
              <option value="32">32</option>
              <option value="40">40</option>
              <option value="48">48</option>
              <option value="60">60</option>
            </select>
          </div>
          <div class="text-opt-row">
            <span class="text-opt-label">글자 색</span>
            <input type="color" id="replaceTextColor" value="#333333" class="text-opt-color" />
          </div>
          <div class="text-opt-row">
            <span class="text-opt-label">배경 색</span>
            <input type="color" id="replaceBgColor" value="#ffffff" class="text-opt-color" />
            <label class="text-opt-nobg"><input type="checkbox" id="replaceNoBg" /> 배경 없음</label>
          </div>
        </div>
        <div style="margin-top:14px;">
          <button id="replaceTextSubmit" class="btn btn--primary btn--sm">교체</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 텍스트 일괄 변경 모달 -->
  <div id="bulkTextModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content" style="max-width:580px;">
      <div class="modal-title-row-main">
        <span class="modal-title-filename">텍스트 일괄 변경</span>
        <button id="bulkTextModalClose" class="btn btn--ghost btn--sm">✕</button>
      </div>

      <!-- 폰트 설정 -->
      <div class="text-opts" style="margin-bottom:14px;">
        <div class="text-opt-row">
          <span class="text-opt-label">폰트</span>
          <select id="bulkFontFamily" class="text-opt-select">
            <option value="Pretendard">Pretendard</option>
          </select>
        </div>
        <div class="text-opt-row">
          <span class="text-opt-label">폰트 크기</span>
          <select id="bulkFontSize" class="text-opt-select">
            <option value="auto">자동</option>
            <option value="16">16</option>
            <option value="20">20</option>
            <option value="24">24</option>
            <option value="32">32</option>
            <option value="40">40</option>
            <option value="48">48</option>
            <option value="60">60</option>
          </select>
        </div>
        <div class="text-opt-row">
          <span class="text-opt-label">글자 색</span>
          <input type="color" id="bulkTextColor" value="#000000" class="text-opt-color" />
        </div>
        <div class="text-opt-row">
          <span class="text-opt-label">배경 색</span>
          <input type="color" id="bulkBgColor" value="#ffffff" class="text-opt-color" />
          <label class="text-opt-nobg"><input type="checkbox" id="bulkNoBg" checked /> 배경 없음</label>
        </div>
      </div>

      <!-- 입력 방법 안내 -->
      <p style="font-size:0.82rem;color:#6b7280;margin-bottom:8px;">
        각 줄에 <code style="background:#f3f4f6;padding:1px 5px;border-radius:3px;">이미지ID | 텍스트</code> 형식으로 입력하세요.<br>
        텍스트 안 줄바꿈은 <code style="background:#f3f4f6;padding:1px 5px;border-radius:3px;">\n</code> 으로 입력합니다.
      </p>
      <textarea id="bulkTextInput" class="text-textarea" rows="10"
        style="width:100%;box-sizing:border-box;font-family:monospace;font-size:0.85rem;"
        placeholder="1748593421304 | 본 포스팅은 아모레퍼시픽 '프리메라'로부터\n원고료를 제공받아 작성되었습니다.&#10;1748820434772 | 본 포스팅은 '해피바스'로부터 제품을 제공받아 직접 체험후 작성된 포스팅입니다."></textarea>

      <div style="display:flex;gap:8px;margin-top:14px;align-items:center;">
        <button id="bulkLoadBtn" class="btn btn--outline btn--sm">현재 텍스트 불러오기</button>
        <button id="bulkTextSubmit" class="btn btn--primary btn--sm">일괄 교체 시작</button>
        <span id="bulkTextStatus" style="font-size:0.83rem;color:#6b7280;"></span>
      </div>
    </div>
  </div>

  <!-- 상세 모달 -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <div id="modal-body"></div>
    </div>
  </div>

  <noscript>자바스크립트를 활성화해 주세요.</noscript>
  <script src="script.js"></script>
</body>
</html>
