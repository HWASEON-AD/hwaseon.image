<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>대시보드 — HWASEON IMAGE</title>
  <link rel="stylesheet" href="dashboard.css" />
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <img src="hwaseon로고.png" alt="Hwaseon" class="brand-logo" />
      </a>
      <nav class="site-nav">
        <a id="userLink" href="register.html">User</a>
        <a id="dashboardLink" href="dashboard.html">Dashboard</a>
        <span id="whoami" class="nav-id"></span>
        <a id="authLink" href="login.html">Login</a>
      </nav>
    </div>
  </header>

  <main class="main">

    <!-- 상단 액션바 -->
    <div class="topbar">
      <a href="index.html" class="btn btn--primary">+ 이미지 업로드</a>
      <button id="excelDownload" class="btn btn--outline">엑셀 다운로드</button>
    </div>

    <!-- 블로그 URL 섹션 -->
    <section class="blog-section" id="blogSection">
      <div class="blog-section__header">
        <h2 class="section-title">블로그 URL 등록</h2>
        <button class="btn btn--ghost btn--sm" id="blogToggleBtn">접기 ▲</button>
      </div>
      <div class="blog-section__body" id="blogSectionBody">
        <form class="blog-form" id="blogForm">
          <input type="url" id="blogUrlInput" class="blog-input"
                 placeholder="https://blog.naver.com/..." required />
          <button type="submit" class="btn btn--primary btn--sm" id="blogSubmitBtn">등록</button>
        </form>
        <div class="blog-list" id="blogList"></div>
      </div>
    </section>

    <!-- 이미지 그리드 -->
    <section class="images-section">
      <div class="section-header">
        <h2 class="section-title">내 이미지 <span id="imageCount" class="count-badge"></span></h2>
      </div>
      <div class="image-grid" id="imageGrid"></div>
    </section>

  </main>

  <!-- 뱃지 팝오버 -->
  <div class="badge-popover hidden" id="badgePopover">
    <div class="badge-popover__header">
      이 이미지를 사용 중인 블로그
      <button id="badgePopoverClose">×</button>
    </div>
    <ul class="badge-popover__list" id="badgePopoverList"></ul>
  </div>

  <!-- 토스트 컨테이너 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 상세 모달 (기존 유지) -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <div id="modal-body"></div>
    </div>
  </div>

  <noscript>자바스크립트를 활성화해 주세요.</noscript>
  <script src="script.js"></script>
</body>
</html>
